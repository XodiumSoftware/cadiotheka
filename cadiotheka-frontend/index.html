<!doctype html>
<html data-theme="halloween" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <meta
            content="Cadiotheka — The open hub for CAD creators. Discover, share, and collaborate on CAD models, tools, and resources."
            name="description"
        />
        <meta
            content="Cadiotheka, CAD, open source, hub, models, engineering, makers"
            name="keywords"
        />
        <meta content="Cadiotheka" name="author" />

        <!-- Canonical URL -->
        <link href="https://cadiotheka.com" rel="canonical" />

        <!-- Open Graph -->
        <meta property="og:title" content="Cadiotheka" />
        <meta
            property="og:description"
            content="The open hub for CAD creators. Discover, share, and collaborate on CAD models, tools, and resources."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://cadiotheka.com" />
        <meta
            property="og:image"
            content="https://cadiotheka.com/cadiotheka-og.svg"
        />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Cadiotheka" />
        <meta
            name="twitter:description"
            content="The open hub for CAD creators. Discover, share, and collaborate on CAD models, tools, and resources."
        />
        <meta
            name="twitter:image"
            content="https://cadiotheka.com/cadiotheka-og.svg"
        />

        <!-- JSON-LD Structured Data -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "Cadiotheka",
                "url": "https://cadiotheka.com",
                "logo": "https://cadiotheka.com/icons/favicon.svg",
                "sameAs": ["https://github.com/XodiumSoftware/cadiotheka"],
                "description": "The open hub for CAD creators. Discover, share, and collaborate on CAD models, tools, and resources."
            }
        </script>

        <!-- Content Security Policy -->
        <!-- TODO: frame-ancestors is ignored when delivered via <meta>. Move it to an HTTP response header on the server serving this HTML. -->
        <meta
            content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com https://api.cadiotheka.com; img-src 'self' https://avatars.githubusercontent.com data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            http-equiv="Content-Security-Policy"
        />

        <!-- DNS Prefetch and Preconnect for GitHub API -->
        <link href="https://api.github.com" rel="dns-prefetch" />
        <link crossorigin="" href="https://api.github.com" rel="preconnect" />
        <link href="https://avatars.githubusercontent.com" rel="dns-prefetch" />
        <link
            crossorigin=""
            href="https://avatars.githubusercontent.com"
            rel="preconnect"
        />

        <link
            data-trunk
            href="public/icons/favicon.svg"
            rel="icon"
            type="image/svg+xml"
        />
        <link data-trunk href="public/style.css" rel="tailwind-css-extra" />
        <link data-trunk href="public/icons" rel="copy-dir" />
        <title>Cadiotheka</title>
    </head>
    <body class="bg-base-100 font-mono"></body>
</html>
