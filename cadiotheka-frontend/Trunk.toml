[tools]
tailwindcss = "2.8.3"

[serve]
# Proxy API requests to the local backend dev server.
[[proxy]]
rewrite = "/data/"
backend = "http://localhost:8787/data/"

[[proxy]]
rewrite = "/login/"
backend = "http://localhost:8787/login/"

[[proxy]]
rewrite = "/auth/"
backend = "http://localhost:8787/auth/"

[build.wasm-opt]
level = "z"
