[package]
name = "cadiotheka"
version = "0.0.1"
edition = "2024"
authors = ["Xodium"]
description = "The open hub for CAD creators"
license = "AGPL-3.0"

[dependencies]
egui = "0.35.0"
eframe = { version = "0.35.0", default-features = false, features = ["glow"] }
egui_phosphor_icons = "0.4.0"
fuzzy-matcher = "0.3.7"
log = "0.4.27"
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.150"
time = { version = "0.3.53", features = ["serde", "formatting", "parsing", "macros"] }
wasm-bindgen-futures = "0.4.58"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3.103"
web-sys = { version = "0.3.103", features = ["Window", "Document", "Element", "HtmlCanvasElement"] }

[profile.release]
opt-level = "z"
lto = true
strip = true

[profile.dev.package."*"]
opt-level = 2

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
