[package]
name = "cadiotheka"
version = "0.0.1"
edition = "2024"
authors = ["Xodium"]
description = "The open hub for CAD creators"
license = "AGPL-3.0"

[dependencies]
egui = "0.35.0"
eframe = { version = "0.35.0", default-features = false, features = ["glow"] }
log = "0.4.27"
wasm-bindgen-futures = "0.4.58"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3.103", features = ["Window", "Document", "Element", "HtmlCanvasElement"] }

[profile.release]
opt-level = 2

[profile.dev.package."*"]
opt-level = 2

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
