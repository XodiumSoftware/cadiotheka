[package]
name = "cadiotheka"
version = "0.0.0"
edition = "2024"

[dependencies]
leptos = { version = "0.8.17", features = ["csr"] }
leptos_i18n = { version = "0.6.2", default-features = false, features = ["csr"] }
wasm-bindgen = "0.2.114"
gloo-timers = { version = "0.4.0", features = ["futures"] }
time = { version = "0.3", features = ["serde", "wasm-bindgen", "macros", "formatting", "parsing"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"
fuzzy-matcher = "0.3.7"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Storage", "MediaQueryList", "Document", "Element", "DomRect", "HtmlElement", "Node", "console", "IntersectionObserver", "IntersectionObserverInit", "IntersectionObserverEntry"] }
console_error_panic_hook = "0.1.7"

[build-dependencies]
leptos_i18n_build = "0.6.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[lints.rust]
unsafe_code = "forbid"

[package.metadata.cargo-machete]
# wasm-bindgen is required at runtime by leptos/wasm-bindgen internals, but our
# code only accesses it through leptos re-exports (e.g. leptos::wasm_bindgen::JsCast).
# cargo-machete does not detect this indirect usage, so keep it ignored.
ignored = ["wasm-bindgen", "leptos_i18n"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
