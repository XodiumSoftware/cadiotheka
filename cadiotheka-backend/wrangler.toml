name = "cadiotheka"
main = "build/worker/shim.mjs"
compatibility_date = "2026-07-15"

[[d1_databases]]
binding = "DB"
database_name = "cadiotheka"
database_id = "c4694439-e7f4-48e0-9e2a-a7e431a8fbce"

[[kv_namespaces]]
binding = "AUTH"
id = "ba027b7e98784b0dae06ab649b1738e4"

[[r2_buckets]]
binding = "PROJECT_ASSETS"
bucket_name = "cadiotheka-assets"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
