name: Frontend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "cadiotheka-frontend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "cadiotheka-frontend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: cadiotheka-frontend

jobs:
  lint:
    name: Lint
    if: |
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.pull_request.title, '[ci-skip]')
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: stable
          components: rustfmt, clippy

      - id: install_wasm_target
        name: Install WASM Target
        run: rustup target add wasm32-unknown-unknown
        shell: bash

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - id: cache_dependencies
        name: Cache dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-${{ hashFiles('**/Cargo.lock') }}

      - id: cache_trunk
        name: Cache Trunk
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-latest

      - id: run_lint
        name: Run Lint
        run: |
          cargo clippy --target wasm32-unknown-unknown --all-targets --all-features -- -W clippy::pedantic -D warnings
          cargo clippy --all-targets --all-features -- -W clippy::pedantic -D warnings
          cargo fmt --all -- --check
        shell: bash

      - id: install_cargo_binstall
        name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.21.0

      - id: run_cargo_machete
        name: Run cargo-machete
        run: |
          cargo binstall cargo-machete --no-confirm --force
          cargo machete

  test:
    name: Test
    if: |
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.pull_request.title, '[ci-skip]')
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: stable

      - id: install_wasm_target
        name: Install WASM Target
        run: rustup target add wasm32-unknown-unknown
        shell: bash

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - id: cache_dependencies
        name: Cache dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-${{ hashFiles('**/Cargo.lock') }}

      - id: run_tests
        name: Run tests
        run: cargo test --lib
        shell: bash
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  build:
    name: Build
    if: |
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.pull_request.title, '[ci-skip]')
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: stable

      - id: install_wasm_target
        name: Install WASM Target
        run: rustup target add wasm32-unknown-unknown
        shell: bash

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - id: cache_dependencies
        name: Cache dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-frontend-${{ hashFiles('**/Cargo.lock') }}

      - id: cache_trunk
        name: Cache Trunk
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-latest

      - id: setup_trunk
        name: Setup Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: latest

      - id: build_app
        name: Build App
        run: trunk build --release

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: cadiotheka-frontend/dist/

  deploy:
    name: Deploy
    if: |
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.pull_request.title, '[ci-skip]')
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - id: deploy
        name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cadiotheka --branch=${{ github.ref_name }} --commit-dirty=true
